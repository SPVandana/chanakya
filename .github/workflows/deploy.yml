name: Test and deploy

# Runs the smoke test on every push and PR. If it passes on a push to main,
# triggers a Render deploy. If it fails, the deploy is skipped so bad code
# never reaches production.
#
# The smoke test (chanakya-pm/scripts/smoke-test.js) covers:
#   - inline JS syntax and absence of browser-parser traps
#     (</script> inside template literals, etc.)
#   - presence of critical DOM ids and function definitions
#     (doLogin, boot, selectDev, showSelectScreen, …)
#   - live server boot: /health, /config.js, /api/auth/login, /api/data shape

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chanakya-pm/package-lock.json
      - name: Install deps
        working-directory: chanakya-pm
        run: npm ci
      - name: Seed users
        working-directory: chanakya-pm
        env:
          JWT_SECRET: ci-smoke-test-secret-xxxxxxxxxxxxxxxxxxxxxxxx
        run: npm run seed
      - name: Smoke test
        working-directory: chanakya-pm
        env:
          JWT_SECRET: ci-smoke-test-secret-xxxxxxxxxxxxxxxxxxxxxxxx
        run: npm run smoke-test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Render API response: $RESPONSE"
          if [ "$RESPONSE" != "201" ]; then
            echo "Deploy trigger failed with status $RESPONSE"
            exit 1
          fi
          echo "Deploy triggered successfully"
