name: Keep Render app alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://chanakya-pm.onrender.com/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: app returned $STATUS"
          fi
