services:
  - type: web
    name: chanakya-pm
    runtime: node
    rootDir: chanakya-pm            # Express app lives in the chanakya-pm/ subdirectory
    buildCommand: npm install && npm run seed && npm run smoke-test
    startCommand: node server.js
    # Auto-spin a disposable preview environment for every pull request.
    # Render mints a fresh SQLite DB per preview (disks are not cloned),
    # so staging never touches production data. Previews auto-suspend after
    # a few hours idle and are torn down when the PR closes.
    previews:
      generation: automatic
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value (also per-preview)
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATA_DIR
        value: /data               # Points to the persistent disk mount below
      - key: GOOGLE_CLIENT_ID
        sync: false                # Set in Render dashboard; blueprint won't overwrite it
      - key: ALLOWED_ORIGINS
        sync: false                # Set in Render dashboard if frontend is on a different origin
    disk:
      name: chanakya-data
      mountPath: /data             # Persistent disk — SQLite DB survives every redeploy
      sizeGB: 1                    # ~$0.25/month; more than enough for SQLite
